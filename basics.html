<!DOCTYPE html>
<!--
doctype declaration:
this tells. the browser using HTML5
-->
<html lang="en">
<head>
    <!--
    <head> section:
        contains metadata about the webpage
        metadata is not displayed on the page
        -->
    <meta charset="UTF-8">
    <!--
    charset="UTF-8"
    defines character encoding
    allows special characters to display correctly
    allows include this
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    viewport meta tag:
    makes the webpage responsive
    important for mobile devices
    -->
    <meta name="description" content="day 1 HTML basics learning page">
    <!--
    -->
    <title>Document</title>
</head>
<body>

    
</body>
</html>
